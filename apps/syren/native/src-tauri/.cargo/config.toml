# Per-target linker flags required by libwebrtc (pulled in transitively
# via the `livekit` crate). Vendored from
# `livekit/rust-sdks/.cargo/config.toml` and trimmed to the targets
# this Tauri shell actually compiles to.
#
# These flags are LOAD-BEARING — without them you get cryptic
# `Undefined symbol` link errors for ObjC runtime helpers (Apple
# targets) or duplicate-symbol errors at static-link time
# (aarch64-linux-gnu).

# Apple targets need `-ObjC` so the linker pulls in every category
# from libwebrtc's static archive. Without it, audio / video unit
# symbols resolve to nil at runtime.
[target.x86_64-apple-darwin]
rustflags = ["-C", "link-args=-ObjC"]

[target.aarch64-apple-darwin]
rustflags = ["-C", "link-args=-ObjC"]

[target.aarch64-apple-ios]
rustflags = ["-C", "link-args=-ObjC"]

[target.aarch64-apple-ios-sim]
rustflags = ["-C", "link-args=-ObjC"]

[target.x86_64-apple-ios]
rustflags = ["-C", "link-args=-ObjC"]

# aarch64 Linux needs lld; the default GNU ld can't merge libwebrtc.a
# without choking on its size.
[target.aarch64-unknown-linux-gnu]
rustflags = ["-C", "link-arg=-fuse-ld=lld"]

# Windows MSVC: libwebrtc is built with the static CRT; matching
# avoids C-runtime mismatch warnings + crashes.
[target.x86_64-pc-windows-msvc]
rustflags = ["-C", "target-feature=+crt-static"]

[target.aarch64-pc-windows-msvc]
rustflags = ["-C", "target-feature=+crt-static"]
