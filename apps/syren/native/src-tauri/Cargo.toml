[package]
name = "syren-native"
version = "0.0.1"
description = "Syren — federated chat on syr"
authors = ["syr.is"]
edition = "2021"
rust-version = "1.77.2"

[lib]
name = "syren_native_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-store = "2"
tauri-plugin-http = "2"
tauri-plugin-opener = "2"

# Mobile (Android / iOS): OAuth callback comes back via deep link.
[target.'cfg(any(target_os = "android", target_os = "ios"))'.dependencies]
tauri-plugin-deep-link = "2"

# Desktop: OAuth callback comes back via a loopback HTTP server that
# `tauri-plugin-oauth` runs on a random port for the duration of the
# auth handshake. The plugin only supports desktop (it depends on
# tiny_http which doesn't build for Android / iOS targets).
[target.'cfg(not(any(target_os = "android", target_os = "ios")))'.dependencies]
tauri-plugin-oauth = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
async-trait = "0.1"
tokio = { version = "1", features = ["sync", "rt"] }
url = "2"
syren-client = { path = "../../../../packages/rust/syren-client" }

# iOS-only: lets us configure WKWebView via objc2 so `env(safe-area-inset-*)`
# returns non-zero values inside the webview.
[target.'cfg(target_os = "ios")'.dependencies]
objc2 = "0.6"
objc2-foundation = { version = "0.3", features = ["NSString"] }
