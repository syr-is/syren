[package]
name = "syren-native"
version = "0.0.1"
description = "Syren — federated chat on syr"
authors = ["syr.is"]
edition = "2021"
rust-version = "1.77.2"

[lib]
name = "syren_native_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-store = "2"
tauri-plugin-deep-link = "2"
tauri-plugin-opener = "2"
tauri-plugin-http = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
async-trait = "0.1"
tokio = { version = "1", features = ["sync", "rt"] }
url = "2"
syren-client = { path = "../../../../packages/rust/syren-client" }

# iOS-only: lets us configure WKWebView via objc2 so `env(safe-area-inset-*)`
# returns non-zero values inside the webview.
[target.'cfg(target_os = "ios")'.dependencies]
objc2 = "0.6"
objc2-foundation = { version = "0.3", features = ["NSString"] }
