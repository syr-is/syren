services:
  # SurrealDB - Multi-model database
  surrealdb:
    container_name: syren-surrealdb
    image: surrealdb/surrealdb:v2.3.10
    command: start --log trace --user ${SURREALDB_USER:-root} --pass ${SURREALDB_PASS:-syren-dev-password} rocksdb://data
    ports:
      - "8100:8000"
    volumes:
      - ./db/data:/data
    environment:
      - SURREAL_LOG=trace
    healthcheck:
      test:
        ["CMD-SHELL", "wget --spider -q http://localhost:8000/status || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # SeaweedFS - S3-compatible distributed storage (message attachments)
  seaweedfs:
    container_name: syren-seaweedfs
    image: chrislusf/seaweedfs:latest
    command: >
      server -s3 -s3.config=/etc/seaweedfs/s3_config.json
      -s3.allowedOrigins=${S3_ALLOWED_ORIGINS:-*}
      -filer=true
    ports:
      - "8343:8333" # S3 API (8343 so we don't clash with syr's 8333)
      - "9343:9333" # Master
      - "8088:8080" # Volume server
      - "8898:8888" # Filer
    volumes:
      - ./s3/data:/data
      - ./s3/s3_config.json:/etc/seaweedfs/s3_config.json
    environment:
      - WEED_MASTER_VOLUME_GROWTH_COPY_1=1
      - WEED_MASTER_VOLUME_GROWTH_COPY_2=0
      - WEED_MASTER_VOLUME_GROWTH_COPY_OTHER=0
      # Config reflected from .env for any ops tooling that runs inside this container
      - PUBLIC_URL=${PUBLIC_URL:-http://localhost:5174}
      - S3_ENDPOINT=${S3_ENDPOINT:-http://localhost:8343}
      - S3_BUCKET=${S3_BUCKET:-syren}
      - S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID:-syren-access-key}
      - S3_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY:-syren-secret-key}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9333/cluster/status"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Surrealist - Visual IDE for SurrealDB
  surrealist:
    container_name: syren-surrealist
    image: surrealdb/surrealist:latest
    ports:
      - "8191:8080"
    environment:
      - SURREAL_URL=${SURREALDB_URL:-ws://surrealdb:8000/rpc}
    depends_on:
      - surrealdb
    restart: unless-stopped
