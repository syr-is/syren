[package]
name = "syren-types"
version = "0.0.1"
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
description = "Shared data model for the syren chat API. Source of truth for both the Rust client and the generated TypeScript Zod schemas / interfaces"
categories = ["api-bindings", "data-structures", "wasm"]
keywords = ["syren", "chat", "syr", "tsify", "zod"]

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Compile-time Rust → Zod schema codegen. Used by the `generate-zod`
# binary in `src/bin/` to emit `@syren/types/src/generated.ts`.
zod_gen = "1.3"
zod_gen_derive = "1.3"

[target.'cfg(target_arch = "wasm32")'.dependencies]
# Auto-derives matching TypeScript interfaces in the wasm-pack `.d.ts`
# whenever this crate is compiled to wasm32 alongside `syren-client`.
tsify-next = { version = "0.5", default-features = false, features = ["js"] }
wasm-bindgen = "0.2"

[[bin]]
name = "generate-zod"
path = "src/bin/generate-zod.rs"
required-features = []
